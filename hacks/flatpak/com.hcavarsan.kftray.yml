app-id: com.hcavarsan.kftray
runtime: org.gnome.Platform
runtime-version: "46"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: kftray
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.kde.StatusNotifierItem-*
  - --device=dri
  - --env=FLATPAK=1
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1

build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: kftray
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/kftray/cargo
        XDG_CACHE_HOME: /run/build/kftray/flatpak-node/cache
        npm_config_cache: /run/build/kftray/flatpak-node/npm-cache
        npm_config_offline: "true"
    sources:
      - type: git
        url: https://github.com/hcavarsan/kftray.git
        branch: flatpak
        commit: ffd52621b5734c71492b9d262492b33f7d14141b

      - node-sources.json
      - cargo-sources.json

      - type: archive
        url: https://registry.npmjs.org/pnpm/-/pnpm-10.15.1.tgz
        sha256: 8c53af02ae3ec1fb0ae75377f8d4d6217c2d7cbe6f03c16350cabf7493de6eff
        dest: pnpm-src

      - type: file
        path: com.hcavarsan.kftray.appdata.xml

    build-commands:
      - ls -la pnpm-src/bin/
      - chmod +x pnpm-src/bin/*
      - export PATH="$PWD/pnpm-src/bin:$PATH" && pnpm install --frozen-lockfile --offline

      - cargo --offline fetch --manifest-path crates/kftray-tauri/Cargo.toml --verbose

      - export PATH="$PWD/pnpm-src/bin:$PATH" && pnpm run build

      - export PATH="$PWD/pnpm-src/bin:$PATH" && cd crates/kftray-tauri && pnpm tauri build -- --no-bundle

      - install -Dm644 -t /app/share/metainfo/ com.hcavarsan.kftray.appdata.xml
      - install -Dm755 -t /app/bin/ crates/kftray-tauri/target/release/kftray

      - install -Dm644 crates/kftray-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.hcavarsan.kftray.png
      - install -Dm644 crates/kftray-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.hcavarsan.kftray.png
      - install -Dm644 crates/kftray-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.hcavarsan.kftray.png

      - |
        cat > /app/share/applications/com.hcavarsan.kftray.desktop << 'EOF'
        [Desktop Entry]
        Version=1.0
        Type=Application
        Name=KFtray
        Comment=A cross-platform system tray application for managing and sharing multiple kubectl port-forward commands
        Exec=kftray
        Icon=com.hcavarsan.kftray
        Terminal=false
        Categories=Development;Network;
        Keywords=kubernetes;kubectl;port-forward;devops;
        StartupWMClass=kftray
        EOF
