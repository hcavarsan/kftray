[package]
name = "kftray-commons"
version = "0.12.2"
description = "KFtray commons"
authors = [
    "Henrique Cavarsan <hencavarsan@gmail.com>",
]
license = "MIT"
homepage = "https://kftray.app"
repository = "https://github.com/hcavarsan/kftray"
edition = "2021"

[dependencies]
anyhow = "1.0.91"
bytes = "1.8.0"
dashmap = "6.1.0"
flate2 = "1.0"
httparse = "1.9.5"
k8s-openapi = { version = "0.23.0", default-features = false, features = ["latest"] }
lazy_static = "1.5.0"
log = "0.4"
rand = "0.8.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.132"
tokio = { version = "1.41.0", features = ["rt-multi-thread", "macros", "full"] }
kube = { version = "0.96", features = ["client", "config", "rustls-tls", "ws", "openssl-tls"] }
tracing = "0.1.40"
uuid = { version = "1.11.0", features = ["v4"] }
dirs = "5.0.1"
tauri = { version = "1.8", default-features = false, features = [
	"updater",
	"api-all",
	"macos-private-api",
	"system-tray",
	"icon-png",
	"devtools",
] }
sqlx = { version = "0.8.2", default-features = false, features = ["sqlite", "runtime-tokio-native-tls"] }
hostsfile = { git = "https://github.com/tonarino/innernet", branch = "main" }
tempfile = "3.13.0"
portpicker = "0.1.1"
futures = "0.3.31"
reqwest = "0.12.9"
env_logger = "0.11.5"
base64 = "0.22.1"
thiserror = "1.0.66"
netstat2 = "0.9.1"
sysinfo = "0.32.0"
tracing-appender = "0.2.3"
tracing-subscriber = { version = "0.3", features = ["env-filter", "time"] }
time = "0.3"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.8"

[lib]
name = "kftray_commons"
path = "src/lib.rs"
